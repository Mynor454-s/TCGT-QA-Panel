<header class="bg-white border-b border-gray-200 sticky top-0 z-40" data-testid="app-header">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-14">
      <a routerLink="/dashboard" class="flex items-center gap-2 text-gray-900 hover:text-blue-600 transition-colors">
        <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" />
        </svg>
        <span class="font-semibold text-sm">{{ title }}</span>
      </a>
      <nav class="flex items-center gap-1">
        <a routerLink="/dashboard" class="px-3 py-1.5 text-xs font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-md transition-colors" data-testid="nav-dashboard">Dashboard</a>
        <a routerLink="/tests" class="px-3 py-1.5 text-xs font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-md transition-colors" data-testid="nav-tests">Tests</a>
        <a routerLink="/execute" class="px-3 py-1.5 text-xs font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-md transition-colors" data-testid="nav-execute">Ejecutar</a>
        <a routerLink="/history" class="px-3 py-1.5 text-xs font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-md transition-colors" data-testid="nav-history">Historial</a>
        <a routerLink="/configuration" class="px-3 py-1.5 text-xs font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-md transition-colors" data-testid="nav-config">Config</a>
      </nav>
    </div>
  </div>
</header>
