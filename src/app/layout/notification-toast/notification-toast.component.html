<div class="fixed top-16 right-4 z-50 flex flex-col gap-2 w-80" data-testid="notification-container">
  @for (notification of notifications(); track notification.id) {
    <div
      class="bg-white border border-gray-200 border-l-4 rounded-md shadow-lg p-3 flex items-start gap-2 animate-slide-in"
      [class]="getBorderClass(notification.type)"
      [attr.data-testid]="'notification-' + notification.id"
    >
      <span [class]="getIconClass(notification.type)" class="mt-0.5">
        @switch (notification.type) {
          @case ('success') { ✓ }
          @case ('error') { ✕ }
          @case ('warning') { ⚠ }
          @case ('info') { ℹ }
        }
      </span>
      <p class="flex-1 text-sm text-gray-700">{{ notification.message }}</p>
      <button
        class="text-gray-400 hover:text-gray-600 text-xs"
        (click)="notificationService.dismiss(notification.id)"
        data-testid="notification-dismiss"
      >
        ✕
      </button>
    </div>
  }
</div>
