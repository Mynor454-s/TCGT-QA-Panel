@if (visible()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center" data-testid="confirm-dialog">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/50"></div>
    <!-- Dialog -->
    <div class="relative bg-white rounded-lg shadow-xl max-w-md w-full mx-4 p-6">
      <h3 class="text-lg font-semibold text-gray-900 mb-2">{{ title() }}</h3>
      <p class="text-sm text-gray-600 mb-6">{{ message() }}</p>
      <div class="flex justify-end gap-3">
        <button
          class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200 transition-colors"
          (click)="cancel.emit()"
          data-testid="confirm-dialog-cancel"
        >
          {{ cancelLabel() }}
        </button>
        <button
          class="px-4 py-2 text-sm font-medium text-white rounded-md transition-colors"
          [class.bg-blue-600]="confirmVariant() === 'primary'"
          [class.hover:bg-blue-700]="confirmVariant() === 'primary'"
          [class.bg-red-600]="confirmVariant() === 'danger'"
          [class.hover:bg-red-700]="confirmVariant() === 'danger'"
          (click)="confirm.emit()"
          data-testid="confirm-dialog-confirm"
        >
          {{ confirmLabel() }}
        </button>
      </div>
    </div>
  </div>
}
