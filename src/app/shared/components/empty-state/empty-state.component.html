<div class="flex flex-col items-center justify-center py-12 text-center" data-testid="empty-state">
  <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-4">
    <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
    </svg>
  </div>
  <h3 class="text-sm font-medium text-gray-900 mb-1">{{ title() }}</h3>
  @if (message()) {
    <p class="text-sm text-gray-500 mb-4 max-w-sm">{{ message() }}</p>
  }
  @if (actionLabel()) {
    <button
      class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 transition-colors"
      (click)="action.emit()"
      [attr.data-testid]="'empty-state-action'"
    >
      {{ actionLabel() }}
    </button>
  }
</div>
